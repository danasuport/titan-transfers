<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Trusted Shops">
  <title>Trusted Shops</title>
  <!-- Outer green circle background -->
  <circle cx="50" cy="50" r="50" fill="#FFDC0F"/>
  <!-- Inner white circle -->
  <circle cx="50" cy="50" r="42" fill="#ffffff"/>
  <!-- Green inner circle -->
  <circle cx="50" cy="50" r="36" fill="#00833E"/>
  <!-- White checkmark -->
  <path fill="#ffffff" stroke="#ffffff" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"
        d="M28 50 L43 65 L72 35"/>
  <!-- Outer star ring: 12 small stars evenly spaced on yellow ring -->
  <g fill="#00833E">
    <!-- stars rendered as small polygons at r=46 from center -->
    <polygon points="50,5 51.2,8.6 55,8.6 52,10.8 53.1,14.4 50,12.2 46.9,14.4 48,10.8 45,8.6 48.8,8.6" transform="rotate(0,50,50)"/>
    <polygon points="50,5 51.2,8.6 55,8.6 52,10.8 53.1,14.4 50,12.2 46.9,14.4 48,10.8 45,8.6 48.8,8.6" transform="rotate(30,50,50)"/>
    <polygon points="50,5 51.2,8.6 55,8.6 52,10.8 53.1,14.4 50,12.2 46.9,14.4 48,10.8 45,8.6 48.8,8.6" transform="rotate(60,50,50)"/>
    <polygon points="50,5 51.2,8.6 55,8.6 52,10.8 53.1,14.4 50,12.2 46.9,14.4 48,10.8 45,8.6 48.8,8.6" transform="rotate(90,50,50)"/>
    <polygon points="50,5 51.2,8.6 55,8.6 52,10.8 53.1,14.4 50,12.2 46.9,14.4 48,10.8 45,8.6 48.8,8.6" transform="rotate(120,50,50)"/>
    <polygon points="50,5 51.2,8.6 55,8.6 52,10.8 53.1,14.4 50,12.2 46.9,14.4 48,10.8 45,8.6 48.8,8.6" transform="rotate(150,50,50)"/>
    <polygon points="50,5 51.2,8.6 55,8.6 52,10.8 53.1,14.4 50,12.2 46.9,14.4 48,10.8 45,8.6 48.8,8.6" transform="rotate(180,50,50)"/>
    <polygon points="50,5 51.2,8.6 55,8.6 52,10.8 53.1,14.4 50,12.2 46.9,14.4 48,10.8 45,8.6 48.8,8.6" transform="rotate(210,50,50)"/>
    <polygon points="50,5 51.2,8.6 55,8.6 52,10.8 53.1,14.4 50,12.2 46.9,14.4 48,10.8 45,8.6 48.8,8.6" transform="rotate(240,50,50)"/>
    <polygon points="50,5 51.2,8.6 55,8.6 52,10.8 53.1,14.4 50,12.2 46.9,14.4 48,10.8 45,8.6 48.8,8.6" transform="rotate(270,50,50)"/>
    <polygon points="50,5 51.2,8.6 55,8.6 52,10.8 53.1,14.4 50,12.2 46.9,14.4 48,10.8 45,8.6 48.8,8.6" transform="rotate(300,50,50)"/>
    <polygon points="50,5 51.2,8.6 55,8.6 52,10.8 53.1,14.4 50,12.2 46.9,14.4 48,10.8 45,8.6 48.8,8.6" transform="rotate(330,50,50)"/>
  </g>
